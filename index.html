<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Talking Character</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>AI Talking Character</h1>
        <div class="character-container">
            <img id="character" class="character" alt="Talking character">
            <div class="mouth-overlay" id="mouthOverlay"></div>
        </div>
        
        <div class="controls">
            <input type="file" id="uploadInput" accept="image/*">
            <button id="useUploadBtn" class="btn">Use Uploaded Image</button>
            <input type="text" id="textInput" placeholder="Enter prompt to generate character..." maxlength="200">
            <button id="generateBtn" class="btn">Generate Character</button>
            <button id="speakBtn" class="btn">Speak</button>
        </div>
        
        <div class="status" id="status">Click "Generate Character" to create your AI character!</div>
    </div>
    
    <script type="module" src="script.js"></script>
